logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.placementpro.backend=INFO

# Activate this configuration only for prod profile
spring.config.activate.on-profile=prod

# Production deployment configuration (Render)
server.port=${PORT:8080}
server.forward-headers-strategy=framework
app.frontend.origins=${APP_FRONTEND_ORIGINS:https://your-frontend-domain.netlify.app}

# Auth cookie settings for cross-domain HTTPS deployments
app.cookie.secure=${APP_COOKIE_SECURE:true}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:None}
app.cookie.domain=${APP_COOKIE_DOMAIN:}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.sslMode=${SPRING_DATASOURCE_SSL_MODE:REQUIRED}
spring.datasource.hikari.data-source-properties.useSSL=${SPRING_DATASOURCE_USE_SSL:true}
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=${SPRING_DATASOURCE_ALLOW_PUBLIC_KEY_RETRIEVAL:true}
spring.datasource.hikari.data-source-properties.serverTimezone=${SPRING_DATASOURCE_SERVER_TIMEZONE:UTC}

# JWT
app.jwt.secret=${JWT_SECRET:placementpro-dev-secret-change-me-at-least-32-bytes-long-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

server.error.include-message=never
server.error.include-binding-errors=never

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger - %msg%n

# Production performance profile
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
